services:
  # ── PostgreSQL + pgvector ──────────────────────────────────
  db:
    image: pgvector/pgvector:pg17
    container_name: docmind_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: docmind_user
      POSTGRES_PASSWORD: docmind_pass
      POSTGRES_DB: docmind
    ports:
      - "5433:5432" # exposed so DBeaver can connect
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U docmind_user -d docmind"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ── FastAPI app ────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: docmind_api
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      # Override DATABASE_URL — inside Docker, host is "db" not "localhost"
      DATABASE_URL: postgresql://docmind_user:docmind_pass@db:5432/docmind
    volumes:
      - .:/app # mount code for hot reload
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data: # named volume — data survives restarts
